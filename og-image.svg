<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#1a1e2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#44c767"/>
      <stop offset="100%" stop-color="#2ea852"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="630" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="white" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="white" stroke-width="1"/>
  </g>
  <!-- Accent bar top -->
  <rect width="1200" height="6" fill="url(#accent)"/>
  <!-- Logo area -->
  <text x="80" y="130" font-size="35" fill="#44c767" font-family="system-ui, sans-serif">🔨</text>
  <text x="130" y="135" font-size="48" fill="white" font-family="system-ui, sans-serif" font-weight="700">Modpack Forge</text>
  <text x="130" y="175" font-size="22" fill="#8b98a5" font-family="system-ui, sans-serif">Minecraft Modpack Maker &amp; Curator</text>
  <!-- Tagline -->
  <text x="80" y="280" font-size="28" fill="#e0e4e8" font-family="system-ui, sans-serif">Forge perfect modpacks in seconds</text>
  <!-- Features -->
  <g transform="translate(80, 330)">
    <rect x="0" y="0" width="320" height="70" rx="12" fill="#1a1e2a" stroke="#2a2e3a" stroke-width="1"/>
    <text x="20" y="30" font-size="20" fill="#44c767" font-family="system-ui, sans-serif">152</text>
    <text x="55" y="30" font-size="16" fill="#e0e4e8" font-family="system-ui, sans-serif">Curated Mods</text>
    <text x="20" y="55" font-size="13" fill="#8b98a5" font-family="system-ui, sans-serif">12 categories hand-picked</text>
  </g>
  <g transform="translate(420, 330)">
    <rect x="0" y="0" width="320" height="70" rx="12" fill="#1a1e2a" stroke="#2a2e3a" stroke-width="1"/>
    <text x="20" y="30" font-size="20" fill="#44c767" font-family="system-ui, sans-serif">70K+</text>
    <text x="75" y="30" font-size="16" fill="#e0e4e8" font-family="system-ui, sans-serif">Modrinth Search</text>
    <text x="20" y="55" font-size="13" fill="#8b98a5" font-family="system-ui, sans-serif">Live API integration</text>
  </g>
  <g transform="translate(760, 330)">
    <rect x="0" y="0" width="320" height="70" rx="12" fill="#1a1e2a" stroke="#2a2e3a" stroke-width="1"/>
    <text x="20" y="30" font-size="20" fill="#44c767" font-family="system-ui, sans-serif">20</text>
    <text x="55" y="30" font-size="16" fill="#e0e4e8" font-family="system-ui, sans-serif">Optimization Mods</text>
    <text x="20" y="55" font-size="13" fill="#8b98a5" font-family="system-ui, sans-serif">Always included by default</text>
  </g>
  <!-- Footer -->
  <text x="80" y="480" font-size="18" fill="#8b98a5" font-family="system-ui, sans-serif">Sodium · Lithium · Starlight · ModernFix · FerriteCore · Embeddium · Iris</text>
  <text x="80" y="520" font-size="18" fill="#8b98a5" font-family="system-ui, sans-serif">Horror · Weather · Fantasy · Technology · Adventure · Magic · Combat</text>
  <text x="80" y="580" font-size="14" fill="#5a6a7a" font-family="system-ui, sans-serif">hollowxtra.github.io/modpack-forge</text>
  <!-- Accent bar bottom -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
